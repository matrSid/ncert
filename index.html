<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ncert.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8f23a;
    --accent2: #f23a6e;
    --text: #e8e8e8;
    --muted: #666;
    --muted2: #444;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── ONBOARDING ── */
  #onboarding {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .ob-box {
    width: 100%;
    max-width: 420px;
  }
  .ob-logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    color: var(--muted);
    margin-bottom: 3rem;
    letter-spacing: -0.02em;
  }
  .ob-logo span { color: var(--accent); }
  .ob-q {
    font-family: 'Space Mono', monospace;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.6rem;
    line-height: 1.3;
  }
  .ob-hint {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 1.1rem;
    font-style: italic;
  }
  .ob-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    outline: none;
    transition: border .15s;
    margin-bottom: 2rem;
  }
  .ob-input:focus { border-color: var(--accent); }
  .ob-input::placeholder { color: var(--muted2); }

  .ob-section { margin-bottom: 2.5rem; }

  .ob-class-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.4rem;
  }
  .ob-class-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.65rem 0;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
  }
  .ob-class-btn:hover { border-color: var(--accent); color: var(--text); }
  .ob-class-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0e0e;
  }

  .ob-submit {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 0.85rem;
    color: #0e0e0e;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
    margin-top: 0.5rem;
  }
  .ob-submit:hover { opacity: 0.85; }
  .ob-submit:disabled { opacity: 0.3; cursor: not-allowed; }

  .ob-err {
    font-size: 0.78rem;
    color: var(--accent2);
    margin-top: -1.5rem;
    margin-bottom: 1.5rem;
    display: none;
    font-family: 'Space Mono', monospace;
  }

  /* ── MAIN APP ── */
  #app { display: none; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,14,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(1rem, 4vw, 2rem);
    height: 52px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left {
    display: flex; align-items: center; gap: 1rem;
  }
  .app-logo {
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: -0.02em;
  }
  .app-logo span { color: var(--accent); }
  .header-greeting {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    border-left: 1px solid var(--border);
    padding-left: 1rem;
  }
  .header-greeting b { color: var(--text); }

  .breadcrumb {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
  }
  .breadcrumb .crumb { cursor: pointer; }
  .breadcrumb .crumb:hover { color: var(--accent); }
  .breadcrumb .sep { color: var(--muted2); }
  .breadcrumb .active { color: var(--text); }

  main { position: relative; }

  /* ── VIEW: HOME ── */
  #view-home {
    padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1rem, 4vw, 2rem);
    max-width: 1100px; margin: 0 auto;
  }
  .home-header {
    margin-bottom: 2rem;
  }
  .home-greeting {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: var(--text);
    margin-bottom: 0.3rem;
  }
  .home-sub {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  .home-sub span { color: var(--accent); }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 0.9rem;
  }
  .class-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 0.5rem;
  }
  .class-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem 1rem;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    position: relative;
  }
  .class-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .class-card.mine {
    border-color: var(--accent);
  }
  .class-card.mine::after {
    content: 'yours';
    position: absolute;
    top: 0.4rem; right: 0.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    color: var(--accent);
    text-transform: lowercase;
  }
  .class-num {
    font-family: 'Space Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0.25rem;
  }
  .class-card.mine .class-num { color: var(--accent); }
  .class-label {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* ── VIEW: SUBJECTS ── */
  #view-subjects, #view-chapters {
    display: none;
    padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1rem, 4vw, 2rem);
    max-width: 1100px; margin: 0 auto;
  }
  .view-head {
    margin-bottom: 1.5rem;
  }
  .view-title {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.25rem;
  }
  .view-meta {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .btn-back {
    display: inline-flex; align-items: center; gap: 0.35rem;
    background: none; border: 1px solid var(--border);
    border-radius: 5px; padding: 0.35rem 0.75rem;
    color: var(--muted); font-size: 0.75rem;
    cursor: pointer; font-family: 'Space Mono', monospace;
    transition: all .15s; margin-bottom: 1.5rem;
  }
  .btn-back:hover { color: var(--text); border-color: var(--text); }

  .search-wrap {
    position: relative; max-width: 300px; margin-bottom: 1.2rem;
  }
  .search-input {
    width: 100%;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.55rem 0.9rem 0.55rem 2.2rem;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 0.8rem; outline: none; transition: border .15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted2); }
  .search-icon {
    position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 0.8rem;
  }

  .subject-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.6rem;
  }
  .subject-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 1.1rem 1.1rem 1.4rem;
    cursor: pointer;
    transition: all .15s;
    position: relative; overflow: hidden;
  }
  .subject-card:hover {
    border-color: var(--sub-color, var(--accent));
    background: var(--surface2);
  }
  .subject-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--sub-color, var(--accent));
    opacity: 0; transition: opacity .15s;
  }
  .subject-card:hover::before { opacity: 1; }
  .subject-icon { font-size: 1.5rem; margin-bottom: 0.6rem; }
  .subject-name {
    font-weight: 600; font-size: 0.85rem; margin-bottom: 0.2rem;
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
  }
  .subject-meta { font-size: 0.72rem; color: var(--muted); font-family: 'Space Mono', monospace; }

  /* ── VIEW: CHAPTERS ── */
  .book-badge {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 0.2rem 0.6rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .prelim-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 0.9rem 1.1rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; flex-wrap: wrap; margin-bottom: 1.2rem;
  }
  .prelim-text p {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem; color: var(--muted);
  }
  .prelim-text span {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem; color: var(--text); font-weight: 700;
    display: block; margin-bottom: 0.15rem;
  }
  .btn-primary {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 0.5rem 1rem;
    font-weight: 600; font-size: 0.78rem;
    cursor: pointer; font-family: 'Space Mono', monospace;
    transition: all .15s; white-space: nowrap;
  }
  .btn-primary:hover { border-color: var(--accent); color: var(--accent); }

  .chapter-list { display: flex; flex-direction: column; gap: 0.35rem; }
  .chapter-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px; padding: 0.7rem 1rem;
    display: flex; align-items: center; gap: 0.9rem;
    transition: all .15s;
  }
  .chapter-row:hover {
    border-color: var(--sub-color, var(--accent));
    background: var(--surface2);
  }
  .ch-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 1.8rem;
  }
  .ch-name {
    flex: 1;
    font-size: 0.85rem;
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
  }
  .ch-actions { display: flex; gap: 0.35rem; flex-shrink: 0; }
  .btn-pdf, .btn-dl {
    border: 1px solid var(--border); border-radius: 5px;
    padding: 0.35rem 0.7rem;
    font-size: 0.72rem; font-weight: 600;
    cursor: pointer; transition: all .15s;
    font-family: 'Space Mono', monospace;
    background: none;
    color: var(--muted);
  }
  .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
  .btn-dl:hover { border-color: var(--text); color: var(--text); }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeIn 0.25s ease both; }
  .stagger > * { animation: fadeIn 0.25s ease both; }
  .stagger > *:nth-child(1) { animation-delay: 0.03s; }
  .stagger > *:nth-child(2) { animation-delay: 0.06s; }
  .stagger > *:nth-child(3) { animation-delay: 0.09s; }
  .stagger > *:nth-child(4) { animation-delay: 0.12s; }
  .stagger > *:nth-child(5) { animation-delay: 0.15s; }
  .stagger > *:nth-child(6) { animation-delay: 0.18s; }
  .stagger > *:nth-child(7) { animation-delay: 0.21s; }
  .stagger > *:nth-child(8) { animation-delay: 0.24s; }
  .stagger > *:nth-child(n+9) { animation-delay: 0.27s; }

  /* ── SETTINGS POPOVER ── */
  .settings-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 5px; padding: 0.3rem 0.6rem;
    color: var(--muted); font-family: 'Space Mono', monospace;
    font-size: 0.7rem; cursor: pointer; transition: all .15s;
    position: relative;
  }
  .settings-btn:hover { color: var(--text); border-color: var(--text); }

  .settings-panel {
    position: absolute; top: 52px; right: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem;
    min-width: 220px; z-index: 200;
    display: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
  }
  .settings-panel.open { display: block; }
  .settings-panel label { color: var(--muted); display: block; margin-bottom: 0.3rem; }
  .settings-panel input {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; padding: 0.45rem 0.6rem;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 0.78rem; outline: none; margin-bottom: 0.8rem;
  }
  .settings-panel input:focus { border-color: var(--accent); }
  .settings-class-row {
    display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.8rem;
  }
  .settings-cls-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.3rem 0.5rem;
    color: var(--muted); font-family: 'Space Mono', monospace;
    font-size: 0.72rem; font-weight: 700; cursor: pointer; transition: all .12s;
  }
  .settings-cls-btn:hover { border-color: var(--accent); color: var(--accent); }
  .settings-cls-btn.selected { background: var(--accent); border-color: var(--accent); color: #0e0e0e; }
  .btn-save-settings {
    width: 100%; background: var(--accent); border: none;
    border-radius: 5px; padding: 0.5rem;
    color: #0e0e0e; font-family: 'Space Mono', monospace;
    font-size: 0.75rem; font-weight: 700; cursor: pointer;
    transition: opacity .15s;
  }
  .btn-save-settings:hover { opacity: 0.85; }

  @media (max-width: 600px) {
    .class-grid { grid-template-columns: repeat(4, 1fr); }
    .ob-class-grid { grid-template-columns: repeat(4, 1fr); }
    .chapter-row { flex-wrap: wrap; }
    .ch-actions { width: 100%; }
    .btn-pdf, .btn-dl { flex: 1; justify-content: center; }
    .header-greeting { display: none; }
  }
</style>
</head>
<body>

<!-- ── ONBOARDING ── -->
<div id="onboarding">
  <div class="ob-box">
    <div class="ob-logo">ncert<span>.</span></div>

    <div class="ob-section">
      <div class="ob-q">what do i call you?</div>
      <div class="ob-hint">your name, nickname, whatever</div>
      <input type="text" class="ob-input" id="ob-name" placeholder="e.g. sid, or sm else idk" maxlength="30" autocomplete="off">
    </div>

    <div class="ob-section">
      <div class="ob-q">which class are you in?</div>
      <div class="ob-hint">you can always change this later</div>
      <div class="ob-class-grid" id="ob-class-grid"></div>
    </div>

    <div class="ob-err" id="ob-err">fill in your name and pick a class first</div>
    <button class="ob-submit" id="ob-submit" onclick="submitOnboarding()">let's go →</button>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="app-logo" onclick="goHome()">ncert<span>.</span></div>
      <div class="header-greeting">hey, <b id="header-name"></b></div>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <nav class="breadcrumb" id="breadcrumb"></nav>
      <div style="position:relative;">
        <button class="settings-btn" id="settings-toggle" onclick="toggleSettings()">⚙ settings</button>
        <div class="settings-panel" id="settings-panel">
          <label>your name</label>
          <input type="text" id="s-name" maxlength="30" autocomplete="off">
          <label>your class</label>
          <div class="settings-class-row" id="s-class-row"></div>
          <button class="btn-save-settings" onclick="saveSettings()">save</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- HOME -->
    <div id="view-home">
      <div class="home-header">
        <div class="home-greeting" id="home-greeting"></div>
        <div class="home-sub">pick a class — or jump straight to <span id="home-class-link" style="cursor:pointer;text-decoration:underline;text-underline-offset:3px;" onclick=""></span></div>
      </div>
      <div class="section-label">all classes</div>
      <div class="class-grid stagger" id="class-grid"></div>
    </div>

    <!-- SUBJECTS -->
    <div id="view-subjects">
      <button class="btn-back" id="back-from-subjects">← classes</button>
      <div class="view-head">
        <div class="view-title" id="subjects-title"></div>
        <div class="view-meta" id="subjects-meta"></div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="subject-search" placeholder="search subjects...">
      </div>
      <div class="subject-grid stagger" id="subject-grid"></div>
    </div>

    <!-- CHAPTERS -->
    <div id="view-chapters">
      <button class="btn-back" id="back-from-chapters">← subjects</button>
      <div class="view-head">
        <span class="book-badge" id="chapters-badge"></span>
        <div class="view-title" id="chapters-title"></div>
        <div class="view-meta" id="chapters-meta"></div>
      </div>
      <div class="prelim-card">
        <div class="prelim-text">
          <span>prelims</span>
          <p>title page, contents &amp; foreword</p>
        </div>
        <button class="btn-primary" id="btn-prelims">open →</button>
      </div>
      <div class="section-label">chapters</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="chapter-search" placeholder="search chapters...">
      </div>
      <div class="chapter-list stagger" id="chapter-grid"></div>
    </div>
  </main>
</div>

<script>
// ─── DATA ───────────────────────────────────────────
// Codes verified against https://ncert.nic.in/textbook.php
// PDF URL pattern: https://ncert.nic.in/textbook/pdf/{code}{NN}.pdf
// where NN = 00 (prelims), 01, 02... (chapters)

const NCERT_BASE = 'https://ncert.nic.in/textbook/pdf/';
let state = { classNum: null, subjectIdx: null };
let USER = { name: '', classNum: null };

// ─── LOCALSTORAGE ───────────────────────────────
function loadUser() {
  try {
    const d = localStorage.getItem('ncert_user');
    if (d) return JSON.parse(d);
  } catch(e) {}
  return null;
}
function saveUser(name, cls) {
  USER = { name, classNum: cls };
  localStorage.setItem('ncert_user', JSON.stringify(USER));
}

// ─── ONBOARDING ─────────────────────────────────
let obClass = null;

function buildObClassGrid() {
  const grid = document.getElementById('ob-class-grid');
  grid.innerHTML = '';
  [6,7,8,9,10,11,12].forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'ob-class-btn';
    btn.textContent = c;
    btn.onclick = () => {
      obClass = c;
      document.querySelectorAll('.ob-class-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    grid.appendChild(btn);
  });
}

function submitOnboarding() {
  const name = document.getElementById('ob-name').value.trim();
  const err = document.getElementById('ob-err');
  if (!name || !obClass) {
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  saveUser(name, obClass);
  startApp();
}

document.getElementById('ob-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const grid = document.getElementById('ob-class-grid');
    const first = grid.querySelector('.ob-class-btn');
    if (!obClass && first) first.click();
    submitOnboarding();
  }
});

// ─── APP ─────────────────────────────────────────
function startApp() {
  document.getElementById('onboarding').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  USER = loadUser();

  document.getElementById('header-name').textContent = USER.name;
  buildSettingsPanel();
  initHome();
  showView('view-home');
}

function showView(id) {
  ['view-home','view-subjects','view-chapters'].forEach(v => {
    document.getElementById(v).style.display = 'none';
  });
  document.getElementById(id).style.display = 'block';
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = '';
  if (state.classNum) {
    html = `<span class="crumb" onclick="goHome()">home</span>`;
    html += ` <span class="sep">/</span> <span class="crumb" onclick="goToSubjects()">class ${state.classNum}</span>`;
    if (state.subjectIdx !== null) {
      const sub = NCERT_DATA[state.classNum].subjects[state.subjectIdx];
      html += ` <span class="sep">/</span> <span class="active">${sub.name.toLowerCase()}</span>`;
    }
  }
  bc.innerHTML = html;
}

// ─── HOME ────────────────────────────────────────
function initHome() {
  const greetings = ['hey', 'yo', 'what\'s up', 'hi'];
  const g = greetings[Math.floor(Math.random() * greetings.length)];
  document.getElementById('home-greeting').textContent = `${g}, ${USER.name}.`;

  const link = document.getElementById('home-class-link');
  link.textContent = `class ${USER.classNum}`;
  link.onclick = () => goToClass(USER.classNum);

  const grid = document.getElementById('class-grid');
  grid.innerHTML = '';
  Object.keys(NCERT_DATA).forEach(cls => {
    const c = parseInt(cls);
    const card = document.createElement('div');
    card.className = 'class-card' + (c === USER.classNum ? ' mine' : '');
    card.innerHTML = `<div class="class-num">${c}</div><div class="class-label">class ${toRoman(c)}</div>`;
    card.onclick = () => goToClass(c);
    grid.appendChild(card);
  });
}

function toRoman(n) {
  return {6:'VI',7:'VII',8:'VIII',9:'IX',10:'X',11:'XI',12:'XII'}[n]||n;
}

function goHome() {
  state = { classNum: null, subjectIdx: null };
  updateBreadcrumb();
  initHome();
  showView('view-home');
  window.scrollTo(0,0);
}

// ─── SUBJECTS ────────────────────────────────────
function goToClass(c) {
  state.classNum = c;
  state.subjectIdx = null;
  updateBreadcrumb();
  renderSubjects();
  showView('view-subjects');
  window.scrollTo(0,0);
}

function goToSubjects() {
  state.subjectIdx = null;
  updateBreadcrumb();
  renderSubjects();
  showView('view-subjects');
  window.scrollTo(0,0);
}

function renderSubjects() {
  const cls = NCERT_DATA[state.classNum];
  document.getElementById('subjects-title').textContent = `class ${state.classNum} — ${cls.stream.toLowerCase()}`;
  document.getElementById('subjects-meta').textContent = `${cls.subjects.length} subjects`;

  const grid = document.getElementById('subject-grid');
  grid.innerHTML = '';
  grid.className = 'subject-grid stagger';
  void grid.offsetWidth;

  cls.subjects.forEach((sub, idx) => {
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.style.setProperty('--sub-color', sub.color);
    card.innerHTML = `
      <div class="subject-icon">${sub.icon}</div>
      <div class="subject-name">${sub.name}</div>
      <div class="subject-meta">${sub.subtitle} · ${sub.chapters.length} ch</div>
    `;
    card.onclick = () => goToSubject(idx);
    grid.appendChild(card);
  });

  const si = document.getElementById('subject-search');
  si.value = '';
  si.oninput = function() { filterSubjects(this.value); };
}

function filterSubjects(q) {
  const cards = document.querySelectorAll('#subject-grid .subject-card');
  const query = q.toLowerCase();
  cards.forEach((card, i) => {
    const sub = NCERT_DATA[state.classNum].subjects[i];
    const m = sub.name.toLowerCase().includes(query) || sub.subtitle.toLowerCase().includes(query);
    card.style.display = m ? '' : 'none';
  });
}

document.getElementById('back-from-subjects').onclick = goHome;

// ─── CHAPTERS ────────────────────────────────────
function goToSubject(idx) {
  state.subjectIdx = idx;
  updateBreadcrumb();
  renderChapters();
  showView('view-chapters');
  window.scrollTo(0,0);
}

function renderChapters() {
  const cls = NCERT_DATA[state.classNum];
  const sub = cls.subjects[state.subjectIdx];

  document.getElementById('chapters-badge').textContent = `class ${state.classNum} · ${sub.subtitle}`;
  document.getElementById('chapters-title').textContent = `${sub.icon} ${sub.name.toLowerCase()}`;
  document.getElementById('chapters-meta').textContent = `${sub.chapters.length} chapters · ncert.nic.in`;

  // Prelims = chapter 00
  const prelimsUrl = NCERT_BASE + sub.code + '00.pdf';
  document.getElementById('btn-prelims').onclick = () => window.open(prelimsUrl, '_blank');

  const grid = document.getElementById('chapter-grid');
  grid.innerHTML = '';
  grid.className = 'chapter-list stagger';
  void grid.offsetWidth;

  sub.chapters.forEach((ch, i) => {
    const chNum = String(i + 1).padStart(2, '0');
    const pdfUrl = NCERT_BASE + sub.code + chNum + '.pdf';
    const row = document.createElement('div');
    row.className = 'chapter-row';
    row.style.setProperty('--sub-color', sub.color);
    row.innerHTML = `
      <div class="ch-num">${i+1}.</div>
      <div class="ch-name">${ch}</div>
      <div class="ch-actions">
        <button class="btn-pdf">open</button>
        <button class="btn-dl">↓</button>
      </div>
    `;
    row.querySelector('.btn-pdf').onclick = () => window.open(pdfUrl, '_blank');
    row.querySelector('.btn-dl').onclick = () => {
      const a = document.createElement('a');
      a.href = pdfUrl; a.download = `Class${state.classNum}_${sub.name}_Ch${chNum}.pdf`;
      a.target = '_blank'; a.click();
    };
    grid.appendChild(row);
  });

  const ci = document.getElementById('chapter-search');
  ci.value = '';
  ci.oninput = function() { filterChapters(this.value); };
}

function filterChapters(q) {
  const rows = document.querySelectorAll('#chapter-grid .chapter-row');
  const sub = NCERT_DATA[state.classNum].subjects[state.subjectIdx];
  const query = q.toLowerCase();
  rows.forEach((row, i) => {
    const m = sub.chapters[i].toLowerCase().includes(query) || String(i+1).includes(query);
    row.style.display = m ? '' : 'none';
  });
}

document.getElementById('back-from-chapters').onclick = goToSubjects;

// ─── SETTINGS ────────────────────────────────────
let sTmpClass = null;

function buildSettingsPanel() {
  const row = document.getElementById('s-class-row');
  row.innerHTML = '';
  sTmpClass = USER.classNum;
  [6,7,8,9,10,11,12].forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'settings-cls-btn' + (c === USER.classNum ? ' selected' : '');
    btn.textContent = c;
    btn.onclick = () => {
      sTmpClass = c;
      document.querySelectorAll('.settings-cls-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    row.appendChild(btn);
  });
  document.getElementById('s-name').value = USER.name;
}

function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) buildSettingsPanel();
}

function saveSettings() {
  const name = document.getElementById('s-name').value.trim() || USER.name;
  saveUser(name, sTmpClass || USER.classNum);
  document.getElementById('header-name').textContent = USER.name;
  document.getElementById('settings-panel').classList.remove('open');
  initHome();
}

document.addEventListener('click', e => {
  const panel = document.getElementById('settings-panel');
  const btn = document.getElementById('settings-toggle');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.remove('open');
  }
});

// ─── INIT ─────────────────────────────────────────
buildObClassGrid();
const saved = loadUser();
if (saved && saved.name && saved.classNum) {
  USER = saved;
  startApp();
}
</script>
